kitting_state_controller:
  type: franka_kitting_controller/KittingStateController
  arm_id: panda
  publish_rate: 250.0 # [Hz]

  # Phase 2: Baseline collection parameters
  T_base: 0.7 # Baseline collection duration [s]
  N_min: 50 # Minimum samples before enabling detection

  # Phase 2: Arm-based contact detector
  enable_arm_contact: true
  k_sigma: 3.0 # Threshold multiplier: theta = mu + k * sigma
  delta_min: 0.3 # [Nm] Minimum absolute rise above mu (noise guard)
  T_arm_hold: 0.10 # [s] Debounce hold time for arm detector

  # Phase 2: Gripper-based contact detector
  enable_gripper_contact: true
  v_stall: 0.003 # [m/s] Stall velocity threshold
  epsilon_w: 0.002 # [m] Directional width gap: (w - w_cmd) > epsilon_w means blocked early
  w_min: 0.002 # [m] Minimum width safety guard (reject contact at mechanical limit)
  T_gripper_hold: 0.10 # [s] Debounce hold time for gripper detector

  # Phase 2: Gripper stop on CONTACT
  stop_on_contact: true # Cancel active gripper action and hold width when CONTACT detected

  # Phase 2: Gripper default parameters (overridable per-command via KittingGripperCommand)
  execute_gripper_actions: true # Set false for signal-only testing mode
  closing_width: 0.04 # [m] Default width for MoveAction in CLOSING
  closing_speed: 0.04 # [m/s] Default speed for MoveAction in CLOSING
  grasp_width: 0.02 # [m] Default width for GraspAction in SECURE_GRASP
  epsilon_inner: 0.005 # [m] Default inner epsilon for GraspAction
  epsilon_outer: 0.005 # [m] Default outer epsilon for GraspAction
  grasp_speed: 0.04 # [m/s] Default speed for GraspAction in SECURE_GRASP
  grasp_force: 10.0 # [N] Default force for GraspAction in SECURE_GRASP

  # Phase 2: UPLIFT micro-lift parameters (overridable per-command via KittingGripperCommand)
  uplift_distance: 0.003 # [m] Default upward displacement (3mm, max 10mm)
  uplift_duration: 1.0 # [s] Cosine-smoothed motion duration
  uplift_reference_frame: "world" # Reference frame for z-axis displacement
  require_secure_grasp: true # If true, UPLIFT only allowed from SECURE_GRASP state
