kitting_state_controller:
  type: franka_kitting_controller/KittingStateController
  arm_id: panda
  publish_rate: 250.0 # [Hz]

  # Grasp: Arm contact detector parameters
  enable_contact_detector: true
  T_base: 0.7 # Baseline collection duration [s]
  N_min: 50 # Minimum samples before enabling detection
  k_sigma: 3.0 # Threshold multiplier: theta = mu + k * sigma
  T_hold_arm: 0.10 # [s] Arm torque debounce hold time
  use_slope_gate: false # Optional slope gate (enable if drift false positives)
  slope_min: 5.0 # Minimum slope for contact [1/s]

  # Grasp: Gripper contact detection parameters
  stall_velocity_threshold: 0.007 # [m/s] Speed below this = stalled
  width_gap_threshold: 0.002 # [m] Min gap: (w - w_cmd) > this to distinguish stall from completion
  # T_hold_gripper: computed dynamically as 0.35 + 0.5 * closing_speed (no config needed)
  stop_on_contact: true # Call gripper stop() on contact detection
  enable_arm_contact: false # Enable arm torque contact detector (requires enable_contact_detector)
  enable_gripper_contact: true # Enable gripper stall contact detector (requires enable_contact_detector)

  # Grasp: Gripper default parameters (overridable per-command via KittingGripperCommand)
  execute_gripper_actions: true # Set false for signal-only testing mode
  closing_width: 0.01 # [m] Default width for MoveAction in CLOSING
  closing_speed: 0.04 # [m/s] Default speed for MoveAction in CLOSING
  grasp_width: 0.02 # [m] Default width for GraspAction in SECURE_GRASP
  epsilon_inner: 0.005 # [m] Default inner epsilon for GraspAction
  epsilon_outer: 0.005 # [m] Default outer epsilon for GraspAction
  grasp_speed: 0.04 # [m/s] Default speed for GraspAction in SECURE_GRASP
  grasp_force: 10.0 # [N] Default force for GraspAction in SECURE_GRASP

  # Grasp: UPLIFT micro-lift parameters (overridable per-command via KittingGripperCommand)
  uplift_distance: 0.003 # [m] Default upward displacement (3mm, max 10mm)
  uplift_duration: 1.0 # [s] Cosine-smoothed motion duration
  require_secure_grasp: true # If true, UPLIFT only allowed from SECURE_GRASP state

  # Recording / Logger parameters (used by launch file, see kitting_state_controller.launch)
  # Set require_logger: true to enable rosbag recording (launch arg: record:=true)
  # When true, the controller waits for the logger node before accepting commands.
  # When false, commands are accepted immediately without recording.
  require_logger: false
  # Logger parameters below are passed to the logger node via launch file <param> overrides.
  # Edit these defaults here or override via launch args (base_directory:=, object_name:=, etc.)
  base_directory: "~/kitting_bags"    # Root directory for trial bags
  object_name: "default_object"       # Object label for directory naming
  export_csv_on_stop: true            # Export CSV alongside rosbag on STOP
